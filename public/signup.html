<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — TicketGo</title>
  <meta name="description" content="Create your TicketGo account — buy tickets or host your own events." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">

    <!-- ── Left: Concert Visual Panel ── -->
    <div class="auth-panel">
      <div class="glow-dots">
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
      </div>
      <div class="panel-crowd"></div>
      <div class="panel-content">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 9V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2a2 2 0 0 1 0 4v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a2 2 0 0 1 0-4z"/>
          </svg>
        </div>
        <div class="brand-name">TicketGo</div>
        <div class="brand-tagline">Premium ticketing for unforgettable experiences</div>
      </div>
    </div>

    <!-- ── Right: Signup Form ── -->
    <div class="auth-form-side">
      <div class="form-box">
        <h1 class="form-title">Create account</h1>
        <p class="form-subtitle">Join thousands of event-goers today</p>

        <!-- Role selector -->
        <div class="role-label">I am a</div>
        <div class="role-toggle" role="group" aria-label="Select account type">
          <button class="role-btn active" data-role="CUSTOMER"  id="role-customer">Ticket Buyer</button>
          <button class="role-btn"        data-role="ORGANIZER" id="role-organizer">Event Host</button>
        </div>

        <!-- Alert banner -->
        <div class="alert" id="signup-alert" role="alert"></div>

        <!-- Form -->
        <form id="signup-form" novalidate>
          <div class="field-group">
            <label class="field-label" for="signup-name">
              Full Name <span class="required">*</span>
            </label>
            <input
              class="field-input"
              type="text"
              id="signup-name"
              name="name"
              placeholder="John Doe"
              autocomplete="name"
              required
            />
            <div class="field-error"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="signup-email">
              Email <span class="required">*</span>
            </label>
            <input
              class="field-input"
              type="email"
              id="signup-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <div class="field-error"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="signup-password">
              Password <span class="required">*</span>
            </label>
            <div class="pw-wrapper">
              <input
                class="field-input"
                type="password"
                id="signup-password"
                name="password"
                placeholder="Min. 6 characters"
                autocomplete="new-password"
                required
              />
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="field-error"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="signup-confirm-password">
              Confirm Password <span class="required">*</span>
            </label>
            <div class="pw-wrapper">
              <input
                class="field-input"
                type="password"
                id="signup-confirm-password"
                name="confirm-password"
                placeholder="Re-enter your password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="pw-toggle" aria-label="Toggle confirm password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="field-error"></div>
          </div>

          <button class="btn-submit" type="submit" id="signup-btn">
            <span class="btn-text">Create Account</span>
            <span class="spinner"></span>
          </button>
        </form>

        <div class="form-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
    initPasswordToggles();
    initRoleToggle();
    document.getElementById('signup-form').addEventListener('submit', handleSignup);
  </script>
</body>
</html>

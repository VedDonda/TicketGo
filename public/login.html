<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TicketGo</title>
  <meta name="description" content="Sign in to TicketGo — premium ticket booking for unforgettable experiences." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">

    <!-- ── Left: Concert Visual Panel ── -->
    <div class="auth-panel">
      <div class="glow-dots">
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
        <div class="glow-dot"></div>
      </div>
      <div class="panel-crowd"></div>
      <div class="panel-content">
        <div class="brand-logo">
          <!-- Ticket icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 9V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2a2 2 0 0 1 0 4v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a2 2 0 0 1 0-4z"/>
          </svg>
        </div>
        <div class="brand-name">TicketGo</div>
        <div class="brand-tagline">Premium ticketing for unforgettable experiences</div>
      </div>
    </div>

    <!-- ── Right: Login Form ── -->
    <div class="auth-form-side">
      <div class="form-box">
        <h1 class="form-title">Welcome back</h1>
        <p class="form-subtitle">Sign in to your account</p>

        <!-- Role selector -->
        <div class="role-label">I want to</div>
        <div class="role-toggle" role="group" aria-label="Select role">
          <button class="role-btn active" data-role="CUSTOMER" id="role-customer">Buy Tickets</button>
          <button class="role-btn"        data-role="ORGANIZER" id="role-organizer">Host Events</button>
        </div>

        <!-- Alert banner -->
        <div class="alert" id="login-alert" role="alert"></div>

        <!-- Form -->
        <form id="login-form" novalidate>
          <div class="field-group">
            <label class="field-label" for="login-email">
              Email <span class="required">*</span>
            </label>
            <input
              class="field-input"
              type="email"
              id="login-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <div class="field-error" id="login-email-error"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="login-password">
              Password <span class="required">*</span>
            </label>
            <div class="pw-wrapper">
              <input
                class="field-input"
                type="password"
                id="login-password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="field-error" id="login-pw-error"></div>
          </div>

          <button class="btn-submit" type="submit" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
          </button>
        </form>

        <div class="form-footer">
          Don't have an account? <a href="/signup.html">Sign up</a>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
    initPasswordToggles();
    initRoleToggle();
    document.getElementById('login-form').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
